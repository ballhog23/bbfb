name: CI

on:
  push:
    branches: [master]

jobs:
  style:
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/amazonlinux/amazonlinux:2023
    steps:
      - name: Install prerequisites
        run: dnf install -y tar gzip git

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint -- --max-warnings=0

      - name: Run formatting check
        run: npm run format:check

  tests:
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/amazonlinux/amazonlinux:2023
    steps:
      - name: Install prerequisites
        run: dnf install -y tar gzip git

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13'

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests
        run: npm run test:ci
        env:
          PLATFORM: ${{ secrets.PLATFORM }}
          PORT: ${{ secrets.PORT }}
          LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
          LEAGUE_SEASON: ${{ secrets.LEAGUE_SEASON }}
          PREV_LEAGUE_ID: ${{ secrets.PREV_LEAGUE_ID }}
          PREV_LEAGUE_SEASON: ${{ secrets.PREV_LEAGUE_SEASON }}
          DB_URL: ${{ secrets.DB_URL }}